name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write

# Direct release per push (no PR gate). Conventional commits determine
# version bump. To use this safely, repo Settings → Actions → General →
# "Workflow permissions" must be set to "Read and write permissions".

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          skip-github-pull-request: true

  build-linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -tags webkit2_41

      - name: Package
        run: tar -czf wakupi-linux-amd64.tar.gz -C build/bin wakupi

      - uses: actions/upload-artifact@v4
        with:
          name: wakupi-linux-amd64
          path: wakupi-linux-amd64.tar.gz

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Package
        run: Compress-Archive -Path build\bin\wakupi.exe -DestinationPath wakupi-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: wakupi-windows-amd64
          path: wakupi-windows-amd64.zip

  upload-assets:
    needs: [release-please, build-linux, build-windows]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wakupi-*
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" wakupi-linux-amd64.tar.gz wakupi-windows-amd64.zip --clobber
