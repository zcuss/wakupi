name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -tags webkit2_41

      - name: Package (tar.gz)
        run: tar -czf wakupi-linux-amd64.tar.gz -C build/bin wakupi

      - uses: actions/upload-artifact@v4
        with:
          name: wakupi-linux-amd64
          path: wakupi-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Package (zip)
        run: Compress-Archive -Path build\bin\wakupi.exe -DestinationPath wakupi-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: wakupi-windows-amd64
          path: wakupi-windows-amd64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wakupi-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Wakupi ${{ github.ref_name }}
          body: |
            ## 🚀 Wakupi ${{ github.ref_name }}

            ### 📥 Download
            - 🐧 [wakupi-linux-amd64.tar.gz](https://github.com/hirotomasato/wakupi/releases/download/${{ github.ref_name }}/wakupi-linux-amd64.tar.gz)
            - 🪟 [wakupi-windows-amd64.zip](https://github.com/hirotomasato/wakupi/releases/download/${{ github.ref_name }}/wakupi-windows-amd64.zip)

            ### Linux
            ```bash
            tar -xzf wakupi-linux-amd64.tar.gz
            ./wakupi
            ```
            > Requires: libwebkit2gtk-4.1

            ### Windows
            Extract `wakupi-windows-amd64.zip` and run `wakupi.exe`

            ### What's New
            - WhatsApp Multi-Account client
            - AI Assistant (OpenAI, Claude, Gemini, Ollama)
            - Dynamic QRIS Generator & Invoice
            - Desktop Controller with WhatsApp remote commands
            - Modern UI with light/dark mode
          files: wakupi-*.tar.gz, wakupi-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
